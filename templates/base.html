<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Notes App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    font-family:'Segoe UI', sans-serif;
}

/* 🔥 HEADER */
.navbar{
    background: linear-gradient(135deg,#141e30,#243b55);
    padding:14px 25px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.navbar-brand{
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
    display:flex;
    align-items:center;
    color:white !important;
}

.navbar-brand img{
    width:42px;
    height:42px;
    border-radius:50%;
    margin-right:10px;
    border:2px solid white;
}

/* NAV LINKS */
.nav-link{
    color:#f1f1f1 !important;
    font-weight:500;
    position:relative;
}

.nav-link::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    background:#00c6ff;
    left:0;
    bottom:-4px;
    transition:0.3s;
}

.nav-link:hover::after{
    width:100%;
}

/* 🔥 FLASH */
.alert{
    border-radius:10px;
}

/* 🔥 FOOTER */
footer{
    margin-top:auto;
    background: linear-gradient(135deg,#141e30,#243b55);
    text-align:center;
    padding:15px;
    font-weight:bold;
    letter-spacing:1px;
    color:white;
    box-shadow:0 -4px 15px rgba(0,0,0,0.3);
}

/* 📱 RESPONSIVE */
@media(max-width:768px){

    .nav-links{
        text-align:center;
        width:100%;
        margin-top:10px;
    }

    .nav-links a{
        display:block;
        padding:8px 0;
    }
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<nav class="navbar navbar-expand-md sticky-top">
<div class="container">

<a class="navbar-brand">
<img src="https://static.vecteezy.com/system/resources/previews/029/722/382/original/notes-icon-in-trendy-flat-style-isolated-on-white-background-notes-silhouette-symbol-for-your-website-design-logo-app-ui-illustration-eps10-free-vector.jpg">
Notes Management System
</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
☰
</button>

<div class="collapse navbar-collapse" id="menu">
<div class="ms-auto nav-links d-flex flex-column flex-md-row gap-3 mt-3 mt-md-0">
<a class="nav-link" href="/">Home</a>
<a class="nav-link" href="/about">About</a>
<a class="nav-link" href="/contact">Contact</a>
</div>
</div>

</div>
</nav>

<!-- 🔥 FLASH MESSAGE -->
<div class="container mt-3">
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{category}} text-center shadow">
        {{message}}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
</div>

<!-- 🔥 PAGE CONTENT -->
<div class="flex-grow-1">
{% block content %}{% endblock %}
</div>

<!-- 🔥 FOOTER -->
<footer>
<p>© 2026 Notes Management System | Built with ❤️</p>
</footer>

<!-- 🔥 AUTO HIDE -->
<script>
setTimeout(function() {
    let alerts = document.querySelectorAll('.alert');
    alerts.forEach(function(alert){
        alert.style.transition = "opacity 0.5s ease";
        alert.style.opacity = "0";
        setTimeout(() => alert.remove(), 500);
    });
}, 3000);
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
